<!DOCTYPE html>
<html>
<head>
  <title>API Test</title>
</head>
<body>

<h2>Add Student  dfd </h2>

<input type="text" id="name" placeholder="Name">
<input type="email" id="email" placeholder="Email">
<button onclick="addStudent()">Add</button>

<h2>Students</h2>
<button onclick="getStudents()">Load Students</button>

<pre id="output">Click "Load Students"</pre>

<script>
// ✅ GET METHOD
function getStudents() {
  fetch("https://api.gymgurus.in/students")
    .then(res => res.text()) // safe for JSON or error
    .then(data => {
      document.getElementById("output").textContent = data;
    })
    .catch(err => {
      document.getElementById("output").textContent = "Error fetching data";
      console.error(err);
    });
}

// ✅ POST METHOD
function addStudent() {
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;

  fetch("https://api.gymgurus.in/students", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ name, email })
  })
  .then(res => res.text()) // safe handling
  .then(data => {
    alert("Student added!");
    console.log(data);
    getStudents(); // refresh list
  })
  .catch(err => {
    alert("Error adding student");
    console.error(err);
  });
}
</script>

</body>
</html>
