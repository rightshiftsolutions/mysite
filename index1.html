<!DOCTYPE html>
<html>
<head>
  <title>API Test</title>
</head>
<body>

<h2>API Status</h2>

<pre id="output">Loading...</pre>

<script>
fetch("https://api.gymgurus.in/")
  .then(res => res.text()) // 👈 because API returns text
  .then(data => {
    document.getElementById("output").textContent = data;
  })
  .catch(err => {
    document.getElementById("output").textContent = "Error loading data";
    console.error(err);
  });
</script>

</body>
</html>
