<!DOCTYPE html>
<html>
<head>
<title>Gym Shop</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/common.css">
<link rel="stylesheet" href="css/theme1.css">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>

<body class="shop-page">

<nav class="navbar navbar-expand-lg navbar-dark fixed-top" id="mainNav">
<div class="container">

<a class="navbar-brand text-uppercase fw-bolder d-flex align-items-center" href="index.html">
<div class="logo-icon bg-accent text-dark rounded-circle d-flex justify-content-center align-items-center me-2" style="width: 40px; height: 40px;">
<i class="fas fa-dumbbell fs-5" style="transform: rotate(-45deg);"></i>
</div>
<span class="fs-4 tracking-wider"><span class="text-white">26</span><span class="text-light fw-light">fitness</span><span class="text-accent">Club</span></span>
</a>

<div class="d-flex align-items-center gap-2 shop-nav-actions">
<a class="shop-back-button" href="index.html">
<i class="fas fa-arrow-left me-2"></i>Back
</a>

<button class="btn btn-warning shop-cart-button" onclick="openCart()">
<i class="fas fa-cart-shopping me-2 shop-cart-icon"></i>Cart (<span id="cartCount">0</span>)
</button>
</div>

</div>
</nav>

<section class="shop-hero">
<div class="container text-center">
<div class="shop-badge">Official Merchandise</div>
<h1 class="section-heading mt-3 mb-4"><span class="text-white">Gym</span> <span class="text-accent">T-Shirts</span></h1>
<p class="section-subheading mb-0">Premium black and neon energy, built for training days and everyday wear.</p>
</div>
</section>

<section class="container shop-products-section">
<div class="shop-category-filter d-flex justify-content-center flex-wrap gap-3 mb-5">
<button class="shop-filter-btn active" type="button" data-category="all" onclick="setCategoryFilter('all', this)">All</button>
<button class="shop-filter-btn" type="button" data-category="men" onclick="setCategoryFilter('men', this)">Men</button>
<button class="shop-filter-btn" type="button" data-category="women" onclick="setCategoryFilter('women', this)">Women</button>
</div>
<div class="row" id="productList"></div>
</section>

<div class="modal fade" id="cartModal">

<div class="modal-dialog">

<div class="modal-content shop-modal-content">

<div class="modal-header">
<h5>Your Cart</h5>
</div>

<div class="modal-body" id="cartItems"></div>

<div class="modal-body pt-0">
<input class="form-control premium-input mb-2" id="cartUsername" placeholder="Name">
<input class="form-control premium-input mb-0" id="cartPhone" placeholder="Phone Number">
</div>

<div class="modal-footer">

<button class="btn btn-accent" onclick="sendWhatsApp()">
Place Order
</button>

</div>

</div>
</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/shop.js"></script>
</body>
</html>
